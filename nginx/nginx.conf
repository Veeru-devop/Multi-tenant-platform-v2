worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Logging ----
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr '
                    'response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 64M;

    # ---- Rate Limiting ----
    limit_req_zone $binary_remote_addr zone=wp_login:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # ---- Gzip Compression ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ---- Upstream Definitions ----
    upstream wp_alpha {
        server wp-alpha:80;
    }

    upstream wp_beta {
        server wp-beta:80;
    }

    # ---- Nginx Status (for Prometheus) ----
    server {
        listen 8080;
        server_name _;

        location /stub_status {
            stub_status;
            allow 0.0.0.0/0;
        }

        location /nginx-health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }

    # ---- Tenant Alpha ----
    server {
        listen 80;
        server_name tenant-alpha.localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Rate limit wp-login
        location = /wp-login.php {
            limit_req zone=wp_login burst=3 nodelay;
            proxy_pass http://wp_alpha;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Block XML-RPC (common attack vector)
        location = /xmlrpc.php {
            deny all;
            return 403;
        }

        # Block access to sensitive files
        location ~* /(?:wp-config\.php|readme\.html|license\.txt) {
            deny all;
            return 404;
        }

        # General rate limiting
        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://wp_alpha;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }
    }

    # ---- Tenant Beta ----
    server {
        listen 80;
        server_name tenant-beta.localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Rate limit wp-login
        location = /wp-login.php {
            limit_req zone=wp_login burst=3 nodelay;
            proxy_pass http://wp_beta;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Block XML-RPC
        location = /xmlrpc.php {
            deny all;
            return 403;
        }

        # Block access to sensitive files
        location ~* /(?:wp-config\.php|readme\.html|license\.txt) {
            deny all;
            return 404;
        }

        # General rate limiting
        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://wp_beta;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }
    }

    # ---- Default: Reject unknown hosts ----
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
}

# ==============================================================
# WordPress Multitenancy Platform — Monitoring Stack (Overlay)
# ==============================================================
# Usage (always with base):
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
# ==============================================================

services:
  # =============================================
  #  PROMETHEUS — Metrics collection
  # =============================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: wp-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - frontend
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================
  #  GRAFANA — Dashboards & Alerting
  # =============================================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: wp-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-grafana_change_me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki

  # =============================================
  #  LOKI — Log aggregation
  # =============================================
  loki:
    image: grafana/loki:2.9.6
    container_name: wp-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================
  #  PROMTAIL — Log shipping to Loki
  # =============================================
  promtail:
    image: grafana/promtail:2.9.6
    container_name: wp-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nginx_logs:/var/log/nginx:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    depends_on:
      - loki

  # =============================================
  #  cADVISOR — Container metrics
  # =============================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: wp-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"
    networks:
      - monitoring

  # =============================================
  #  MySQL Exporter — Tenant Alpha DB metrics
  # =============================================
  mysqld-exporter-alpha:
    image: prom/mysqld-exporter:v0.15.1
    container_name: wp-mysqld-exporter-alpha
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "root:${ALPHA_DB_ROOT_PASSWORD:-alpha_root_change_me}@(db-alpha:3306)/"
    networks:
      - monitoring
      - backend-alpha
    depends_on:
      db-alpha:
        condition: service_healthy

  # =============================================
  #  MySQL Exporter — Tenant Beta DB metrics
  # =============================================
  mysqld-exporter-beta:
    image: prom/mysqld-exporter:v0.15.1
    container_name: wp-mysqld-exporter-beta
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "root:${BETA_DB_ROOT_PASSWORD:-beta_root_change_me}@(db-beta:3306)/"
    networks:
      - monitoring
      - backend-beta
    depends_on:
      db-beta:
        condition: service_healthy

  # =============================================
  #  NGINX EXPORTER — Nginx metrics for Prometheus
  # =============================================
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1
    container_name: wp-nginx-exporter
    restart: unless-stopped
    command:
      - '--nginx.scrape-uri=http://nginx:8080/stub_status'
    networks:
      - frontend
      - monitoring
    depends_on:
      - nginx

# =============================================
#  ADDITIONAL NETWORKS
# =============================================
networks:
  monitoring:
    name: wp-monitoring
    driver: bridge
  # Reference existing networks from base compose
  frontend:
    name: wp-frontend
  backend-alpha:
    name: wp-backend-alpha
  backend-beta:
    name: wp-backend-beta

# =============================================
#  ADDITIONAL VOLUMES
# =============================================
volumes:
  prometheus_data:
    name: prometheus_data
  grafana_data:
    name: grafana_data
  loki_data:
    name: loki_data
  # Reference existing volume from base compose
  nginx_logs:
    name: nginx_logs

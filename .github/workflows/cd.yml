# ==============================================================
# CD Pipeline — Build & Deploy
# ==============================================================
# Runs on merge to main or version tag: builds versioned artifacts
# and simulates deployment into the platform.
# ==============================================================

name: CD — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'wp-content/**'
  create:
    tags:
      - 'v*'

permissions:
  contents: write    # Required for creating releases

env:
  THEME_NAME: starter-theme
  PLUGIN_NAME: starter-plugin

jobs:
  # ---- Job 1: Build Versioned Artifacts ----
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            # Use short SHA for non-tag builds
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Building version: $VERSION"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Build Theme
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd wp-content/themes/${{ env.THEME_NAME }}
          composer install --no-dev --prefer-dist --no-progress
          # Update version in style.css
          sed -i "s/Version:.*/Version: ${VERSION}/" style.css
          cd ..
          # Create zip excluding dev files
          zip -r "${THEME_NAME}-${VERSION}.zip" "${{ env.THEME_NAME }}/" \
            -x "*/vendor/squizlabs/*" \
            -x "*/vendor/phpstan/*" \
            -x "*/.git*" \
            -x "*/composer.lock" \
            -x "*/phpstan.neon"
          echo "✅ Built: ${THEME_NAME}-${VERSION}.zip"

      - name: Build Plugin
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd wp-content/plugins/${{ env.PLUGIN_NAME }}
          composer install --no-dev --prefer-dist --no-progress
          cd ..
          zip -r "${PLUGIN_NAME}-${VERSION}.zip" "${{ env.PLUGIN_NAME }}/" \
            -x "*/vendor/squizlabs/*" \
            -x "*/vendor/phpstan/*" \
            -x "*/.git*" \
            -x "*/composer.lock"
          echo "✅ Built: ${PLUGIN_NAME}-${VERSION}.zip"

      - name: Upload Theme Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.THEME_NAME }}-${{ steps.version.outputs.version }}
          path: wp-content/themes/${{ env.THEME_NAME }}-${{ steps.version.outputs.version }}.zip
          retention-days: 30

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-${{ steps.version.outputs.version }}
          path: wp-content/plugins/${{ env.PLUGIN_NAME }}-${{ steps.version.outputs.version }}.zip
          retention-days: 30

  # ---- Job 2: Simulate Deployment ----
  deploy-simulate:
    name: Simulate Deployment
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Setup environment
        run: cp .env.example .env

      - name: Start platform (WordPress only)
        run: |
          docker compose up -d
          echo "Waiting for services to be healthy..."
          sleep 60

      - name: Check container health
        run: |
          echo "=== Container Status ==="
          docker compose ps
          echo ""
          echo "=== Health Check: Tenant Alpha ==="
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" \
            -H "Host: tenant-alpha.localhost" http://localhost:80 || echo "⚠️ Alpha not ready"
          echo ""
          echo "=== Health Check: Tenant Beta ==="
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" \
            -H "Host: tenant-beta.localhost" http://localhost:80 || echo "⚠️ Beta not ready"

      - name: Simulate artifact deployment
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          echo "📦 Deploying version: $VERSION"

          # Deploy theme to Tenant Alpha
          THEME_ZIP=$(find ./artifacts -name "*theme*.zip" | head -1)
          if [ -n "$THEME_ZIP" ]; then
            echo "Deploying theme: $THEME_ZIP → wp-alpha"
            docker cp "$THEME_ZIP" wp-alpha:/tmp/theme.zip
            docker exec wp-alpha bash -c \
              "cd /var/www/html/wp-content/themes && unzip -o /tmp/theme.zip && rm /tmp/theme.zip"
            echo "✅ Theme deployed to Tenant Alpha"
          fi

          # Deploy plugin to Tenant Alpha
          PLUGIN_ZIP=$(find ./artifacts -name "*plugin*.zip" | head -1)
          if [ -n "$PLUGIN_ZIP" ]; then
            echo "Deploying plugin: $PLUGIN_ZIP → wp-alpha"
            docker cp "$PLUGIN_ZIP" wp-alpha:/tmp/plugin.zip
            docker exec wp-alpha bash -c \
              "cd /var/www/html/wp-content/plugins && unzip -o /tmp/plugin.zip && rm /tmp/plugin.zip"
            echo "✅ Plugin deployed to Tenant Alpha"
          fi

      - name: Post-deploy verification
        run: |
          echo "=== Post-Deploy Health Check ==="
          curl -sf -o /dev/null -w "Alpha: HTTP %{http_code}\n" \
            -H "Host: tenant-alpha.localhost" http://localhost:80 || echo "⚠️ Alpha failed"
          curl -sf -o /dev/null -w "Beta: HTTP %{http_code}\n" \
            -H "Host: tenant-beta.localhost" http://localhost:80 || echo "⚠️ Beta failed"

      - name: Cleanup
        if: always()
        run: docker compose down -v

  # ---- Job 3: Create GitHub Release (on tag only) ----
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, deploy-simulate]
    if: github.ref_type == 'tag'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## WordPress Platform Release ${{ github.ref_name }}

            ### Artifacts
            - 🎨 Theme: `${{ env.THEME_NAME }}-${{ needs.build.outputs.version }}.zip`
            - 🔌 Plugin: `${{ env.PLUGIN_NAME }}-${{ needs.build.outputs.version }}.zip`

            ### Deployment
            Download the artifacts and deploy via:
            ```bash
            make deploy TENANT=alpha ARTIFACT=<path-to-zip>
            ```

            ### Rollback
            To rollback, deploy a previous version's artifact zip.
          files: |
            artifacts/**/*.zip
          draft: false
          prerelease: false

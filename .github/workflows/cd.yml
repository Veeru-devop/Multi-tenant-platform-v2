# ==============================================================
# CD Pipeline — Build & Deploy
# ==============================================================
# Runs on merge to main or version tag: builds versioned artifacts
# and simulates deployment into the platform.
# ==============================================================

name: CD — Build & Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'wp-content/**'

permissions:
  contents: write    # Required for creating releases

env:
  THEME_NAME: starter-theme
  PLUGIN_NAME: starter-plugin

jobs:
  # ---- Job 1: Build Versioned Artifacts ----
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            # Use short SHA for non-tag builds
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Building version: $VERSION"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Build Release Artifact
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "📦 Building full wp-content release: $VERSION"
          
          # Install composer dependencies for ALL themes/plugins if any
          for composer_file in $(find wp-content -name "composer.json"); do
             dir=$(dirname "$composer_file")
             cd "$dir"
             composer install --no-dev --prefer-dist --no-progress
             cd "$GITHUB_WORKSPACE"
          done
          
          # Create zip excluding dev files
          zip -r "wp-content-release-${VERSION}.zip" wp-content/ \
            -x "*/vendor/squizlabs/*" \
            -x "*/vendor/phpstan/*" \
            -x "*/.git*" \
            -x "*/composer.lock" \
            -x "*/phpstan.neon"
          echo "✅ Built: wp-content-release-${VERSION}.zip"

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v3
        with:
          name: wp-content-release-${{ steps.version.outputs.version }}
          path: wp-content-release-${{ steps.version.outputs.version }}.zip
          retention-days: 30

  # ---- Job 2: Simulate Deployment ----
  deploy-simulate:
    name: Simulate Deployment
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          path: ./artifacts

      - name: Setup environment
        run: cp .env.example .env

      - name: Start platform (WordPress only)
        run: |
          if [ "$ACT" = "true" ]; then
            echo "Patching docker-compose.yml for act Windows bug..."
            sed -i 's|- ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro||g' docker-compose.yml
            docker compose up -d
            docker cp ./nginx/nginx.conf wp-nginx:/etc/nginx/nginx.conf
            docker exec wp-nginx nginx -s reload
          else
            docker compose up -d
          fi
          echo "Waiting for services to be healthy..."
          sleep 60

      - name: Check container health
        run: |
          echo "=== Container Status ==="
          docker compose ps
          echo ""
          echo "=== Health Check: Tenant Alpha ==="
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" \
            -H "Host: tenant-alpha.localhost" http://localhost:80 || echo "⚠️ Alpha not ready"
          echo ""
          echo "=== Health Check: Tenant Beta ==="
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" \
            -H "Host: tenant-beta.localhost" http://localhost:80 || echo "⚠️ Beta not ready"

      - name: Simulate artifact deployment
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          echo "📦 Deploying version: $VERSION"

          # Deploy full wp-content payload
          RELEASE_ZIP=$(find ./artifacts -name "wp-content-release*.zip" | head -1)
          if [ -n "$RELEASE_ZIP" ]; then
            echo "Deploying release: $RELEASE_ZIP → all tenants"
            unzip -q -o "$RELEASE_ZIP" -d ./extracted-release
            
            # Use docker cp to merge extracted wp-content into the containers
            # Copying extracted wp-content directory merges it without deleting existing non-tracked files (like uploads/)
            docker cp ./extracted-release/wp-content wp-alpha:/var/www/html/
            docker cp ./extracted-release/wp-content wp-beta:/var/www/html/
            
            echo "✅ Release deployed to Tenant Alpha & Beta"
          fi

      - name: Post-deploy verification
        run: |
          echo "=== Post-Deploy Health Check ==="
          curl -sf -o /dev/null -w "Alpha: HTTP %{http_code}\n" \
            -H "Host: tenant-alpha.localhost" http://localhost:80 || echo "⚠️ Alpha failed"
          curl -sf -o /dev/null -w "Beta: HTTP %{http_code}\n" \
            -H "Host: tenant-beta.localhost" http://localhost:80 || echo "⚠️ Beta failed"

      - name: Cleanup
        if: always()
        run: |
          echo "Cleanup disabled so you can view the deployment in your browser!"
          # docker compose down -v

  # ---- Job 3: Create GitHub Release (on tag only) ----
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, deploy-simulate]
    if: github.ref_type == 'tag'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## WordPress Platform Release ${{ github.ref_name }}

            ### Artifacts
            - 📁 Core/Content Payload: `wp-content-release-${{ needs.build.outputs.version }}.zip`

            ### Deployment
            Download the artifacts and deploy via:
            ```bash
            make deploy TENANT=alpha ARTIFACT=<path-to-zip>
            ```

            ### Rollback
            To rollback, deploy a previous version's artifact zip.
          files: |
            artifacts/**/*.zip
          draft: false
          prerelease: false
